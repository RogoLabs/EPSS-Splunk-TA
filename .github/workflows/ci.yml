name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install test dependencies
        run: pip install pytest requests-mock
      - name: Run unit tests
        env:
          PYTHONPATH: ${{ github.workspace }}/TA-epss/bin:${{ github.workspace }}/TA-epss/bin/lib
        run: pytest tests/unit/ -v

  appinspect:
    name: AppInspect
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"
      - name: Install AppInspect
        run: pip install splunk-appinspect
      - name: Build package
        run: |
          COPYFILE_DISABLE=1 tar -czf TA-epss.tar.gz \
            --exclude='.*' \
            --exclude='__pycache__' --exclude='*.pyc' --exclude='*.pyo' \
            --exclude='local' --exclude='metadata/local.meta' \
            TA-epss/
      - name: Run AppInspect
        run: splunk-appinspect inspect TA-epss.tar.gz --mode precert
      - name: Upload package artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: ta-epss-package
          path: TA-epss.tar.gz

  docker-integration:
    name: Docker Integration Tests
    runs-on: ubuntu-latest
    needs: [unit-tests, appinspect]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: pip install pytest requests
      - name: Start Splunk container
        run: |
          docker run -d --name splunk \
            -p 8089:8089 -p 8000:8000 \
            -e SPLUNK_START_ARGS=--accept-license \
            -e SPLUNK_PASSWORD=TestPassword123! \
            -e "SPLUNK_GENERAL_TERMS=--accept-sgt-current-at-splunk-com" \
            splunk/splunk:latest
          echo "Waiting for Splunk to be healthy..."
          for i in $(seq 1 60); do
            STATUS=$(docker inspect --format='{{.State.Status}}' splunk 2>/dev/null || echo "missing")
            if [ "$STATUS" = "exited" ]; then
              echo "ERROR: Container exited unexpectedly"
              docker logs splunk 2>&1 | tail -30
              exit 1
            fi
            if curl -sf -k -u admin:TestPassword123! \
              https://localhost:8089/services/server/info > /dev/null 2>&1; then
              echo "Splunk is ready"
              break
            fi
            echo "Waiting... ($i/60) [container: $STATUS]"
            sleep 10
          done
      - name: Install add-on
        run: |
          COPYFILE_DISABLE=1 tar -czf TA-epss.tar.gz \
            --exclude='.*' \
            --exclude='__pycache__' --exclude='*.pyc' --exclude='*.pyo' \
            --exclude='local' --exclude='metadata/local.meta' \
            TA-epss/
          docker cp TA-epss.tar.gz splunk:/tmp/TA-epss.tar.gz
          docker exec -u root splunk bash -c 'cd /opt/splunk/etc/apps && tar xzf /tmp/TA-epss.tar.gz && chown -R splunk:splunk TA-epss && chmod +x TA-epss/bin/*.py'
          echo "=== Verifying install ==="
          docker exec -u splunk splunk bash -c 'ls -la /opt/splunk/etc/apps/TA-epss/bin/epss.py'
          docker exec -u splunk splunk bash -c '/opt/splunk/bin/splunk cmd python3 /opt/splunk/etc/apps/TA-epss/bin/epss.py --scheme | head -3'
          docker exec -u splunk splunk bash -c '/opt/splunk/bin/splunk restart --accept-license --answer-yes --no-prompt'
          echo "Waiting for Splunk restart..."
          for i in $(seq 1 30); do
            if curl -sf -k -u admin:TestPassword123! \
              https://localhost:8089/services/server/info > /dev/null 2>&1; then
              echo "Splunk is ready"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 10
          done
      - name: Verify add-on installation
        run: |
          echo "=== Checking modular input registration ==="
          docker exec -u splunk splunk bash -c '/opt/splunk/bin/splunk cmd python3 /opt/splunk/etc/apps/TA-epss/bin/epss.py --scheme' 2>&1 || true
          echo "=== Checking splunkd logs for epss ==="
          docker exec -u splunk splunk bash -c 'grep -i "epss\|Introspect" /opt/splunk/var/log/splunk/splunkd.log | tail -20' 2>&1 || true
          echo "=== Listing installed apps ==="
          curl -sk -u admin:TestPassword123! 'https://localhost:8089/services/apps/local?output_mode=json' | python3 -c "import sys,json; apps=json.load(sys.stdin)['entry']; print('\n'.join(a['name'] for a in apps))" 2>&1 || true
          echo "=== Checking modular inputs ==="
          curl -sk -u admin:TestPassword123! 'https://localhost:8089/services/data/modular-input?output_mode=json' | python3 -c "import sys,json; inputs=json.load(sys.stdin)['entry']; print('\n'.join(i['name'] for i in inputs))" 2>&1 || true
      - name: Run integration tests
        env:
          SPLUNK_URL: https://localhost:8089
          SPLUNK_USER: admin
          SPLUNK_PASSWORD: TestPassword123!
        run: pytest tests/integration/ -v -m "not live" || echo "No integration tests yet"
      - name: Dump logs on failure
        if: failure()
        run: |
          echo "=== splunkd.log epss/modular/scheme references ==="
          docker exec -u splunk splunk bash -c 'grep -i "epss\|modular.*input\|scheme\|Invalid key\|ExecProcessor" /opt/splunk/var/log/splunk/splunkd.log | tail -40' 2>&1 || true
          echo "=== btool check ==="
          docker exec -u splunk splunk bash -c '/opt/splunk/bin/splunk btool check 2>&1 | grep -i epss' || true
          echo "=== file listing ==="
          docker exec -u splunk splunk bash -c 'ls -la /opt/splunk/etc/apps/TA-epss/bin/epss.py' 2>&1 || true
      - name: Cleanup
        if: always()
        run: docker rm -f splunk || true
